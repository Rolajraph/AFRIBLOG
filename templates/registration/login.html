{% extends 'index.html' %}
{% load static %}

{% block content %}
<main class="login-wrapper" style="max-width: 400px; margin: 80px auto; padding: 40px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <header style="text-align: center; margin-bottom: 30px;">
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem; margin-bottom: 10px;">Welcome Back</h2>
        <p style="color: #666; font-size: 0.9rem;">Sign in to continue your story.</p>
    </header>
    
    <form method="POST" class="login-form">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: 600;">Sign In</button>
    </form>
    <p>Don't have an account? <a href="{% url 'register' %}">Sign up here</a>.</p>
</main>
{% endblock %}
